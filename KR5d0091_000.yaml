front:
  text: 上陽子金丹大要圖夫三
  hash: sha256:9ad47790fffa00ace95c1b2a54de09113096c63abb3ea27e12ddaa1ed8fc10b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0091_HFL_000-001a, image: hfl/0738/0738-062.png}
body:
  text: 紫霄絳宮上陽子觀吾陳致虛撰太隂陽未分極圖形如雞子太一隂一陽之謂道黑極濁為隂白而清為陽分太極者隂陽之本始判天地者隂陽之形體圖先天太隂太極而生陽極顛倒用之成丹圖後天太陽太極而生隂極五行順則成人圖金丹隂陽相交九水火既濟還圖金丹黑中有白七體變純乾返圖天一生水水中真陽之氣為黑鉛鉛乃五金之祖金正位居西不曰金而金曰銀者象兌之色白也金本生水修丹丹之士却於坎中取金五者以母隱子胎故也地行二生火火中真隂之精之為黑汞汞乃朱砂之父圖汞正位居東不曰木而曰汞者即震宫之木液也木能生火修丹之士却於離中求木液者以弦氣所在故也太極順逆圖元氣體象圖紫陽翁云三五一都三箇字古今明者實然金稀東三南二同成五丹北一西方四共之戊三已自居生數五三家五相見結嬰兒嬰兒是一一含真氣十月胎圓圖入聖基上陽子曰一乃天地之祖氣明三五一者即知真鉛所生大道生一氣氣中分隂陽隂濁而陽清雌黑而雄白太上曰知清乾坤本體其白守其黑知其雄守其雌故濁經云清者濁之源動者靜之基動人能常清靜天地悉皆歸泥丸靜云我昔工夫行一年六脈已息之氣歸根如今通身是白血已覺圖離坎為用四季無寒熱紫陽云黑白相扶是水金上陽子曰乾坤為體却歸坎中之白以還離故云金丹寶珠一顆初産于蚌胎之中養護於驪龍之頷世尊得之號曰牟尼天尊得之號為黍米大修行人要知此珠端的即寶是坎離既濟之一點也與天珠地合德日月合明曰牟尼珠之者龍女所獻也曰元始懸一圖珠者海蚌取之也曰如意珠者姹女所配也曰火珠者驪龍頷之物也凡世之珠雖徑寸可玩而有價此珠雖至微不可玩不可見而無價之寶也日月乃乾坤之精離坎乃隂陽之用乾坤金為鼎器者取日月之丹精也以隂陽為爐炭四者會坎離之氣也丹象法顛倒為地天泰丹之道翻覆為水火既濟圖經曰日居離位翻為女坎配蟾宫却是男不因師指此事難知金丹八卦之圖金丹八卦圖説卦者象也有體則必有用有變則必有合如以艮為體則以坤為用以震為體者則以兊為用易曰西南得朋乃與類行猶離以坎為類也修金丹者取金於兌而兌為白虎專以食啖為心其害人傷物為不少若能制御震宫之青龍則自能降其虎矣金丹者只降得白虎一物餘皆易事耳夫兌生于坤而代坤行道乾金生兌初因朴散乾乃寄金于坎號曰黑鉛取兌金于坎者母隱子胎也釋云一口吸盡西江水者此也形物相感之圖形物相感説老君曰內觀其心心無其心外觀其形形無其形遠觀其物物無其物三者既悟唯見於空釋氏云乾坤之內宇宙之間中有一寶祕在形山又曰吾有一物上拄天下拄地諸人還識麼易曰形而上者謂之道又曰男女媾精萬物化生三教修行不離形物故丹陽翁云速把我人山放倒急將龍虎穴沖開伯陽翁云耳目口三寶閉塞勿發通真人潛深淵浮遊守規中領悟到此方知龍虎之形龜蛇之物皆從人身中而有非此二物不能交結聖胎至妙毋忽明鏡丹道圖紫陽丹房寶鑑之圖懸胎鼎鼎周圍一尺五寸中虛五寸長一尺二寸狀似蓬壺亦如人之身形分三層應三才鼎身腹通直令上中下等均勻入爐八寸懸於竈中不著地懸胎是也又謂之朱砂鼎張隨注云又名太一神爐滿庭芳真鐵牛兒形容醜惡性剛偏好爭馳人人皆有那箇解牽騎種就黃芽滿院更須用神水澆之中宫裏若無此獸安得以嬰兒乾坤真動靜生成家活總賴於伊飢餐虎髓渴飲水銀池夜半牽車進火霞光迸海底騰輝牧童笑華池宴罷乘箇月明歸偃月爐爐面周圍約一尺二寸明心橫有一尺立唇環匝二寸唇厚二寸爐口偃開鍋釜又如仰月狀故名偃月爐也張隨注又名威光鼎參妻臣水銀流珠玉液神水姹女玄女木液白雪碧眼胡兒青衣女子汞東海青龍交梨浮隂火白賔客民子天魂丹基黑龜精陽中真隂下弦銀半斤已上汞之異名金丹火丹內丹還丹神丹真鉛大藥嬰兒谷神聖胎刀圭七返玉壼丹紫金丹絳雪丹赤赫金丹龍虎大藥金液還丹玉液還丹九轉丹紫金霜真黃芽真隂陽真玄牝真父母真龍虎真種子真主人名真鉛汞真一宇宙之主秋石河車金公金妃陽丹金鼎君黃男三五一美金花摩尼珠白馬牙水中金玉蘂金砂神符白雪龜精鳳髓免髓鳥肝日魂月𩲸壼中日月先天地精太一含真氣商夫君金液金華玉池華池嬰兒黃男金精黃芽白頭老子鉛素練郎君西山白虎火棗沉黃牙鉛主人父母地𩲸丹母赤鳯髓隂中真陽上弦金八兩已上鉛之異名攢簇乾坤造化來手摶日月煉成灰紫金公無言姹女死黃婆不老猶懷胎清真火本無候金丹鉛爐慢養真金液火土釜先乾活水銀候訣大藥不計斤汞心煉神赤龍性鉛身凝氣白虎命內外渾無一點隂萬象光中玉清境一採藥收拾身心斂藏神氣七沐浴洗心滌慮十三工夫暮採朝收時煎日煉丹法二結丹氣凝聚念不動八丹砂有無交人隱顯相符十四交媾念念相續同成一片參三烹煉金液煉形玉符保神九過關果生枝上子在胞中十五大還對景無心晝夜如一同十四固濟絶念忘形十分胎雞龍抱卵蟬到成形十六聖胎蟄其神藏其氣八之五武火奮迅精神祛除雜念十一溫養知白守黑神明自來十七九轉火候足嬰兒現訣六文火溫溫不絶綿綿若存十二防危一念外馳火候差失十八换鼎子又生孫千百億化林神鳳金丹法象投壺圖訣曰金瓶投木箭氣穴引神歸心正形端者機籌善發揮若知此訣即惟精惟一允執厥中之道也天地先生曰萬般作用盡狂圖獨有金丹可入壼識得不空無有理修真方不費工夫天地先生東吳人也上陽子金丹大要圖
